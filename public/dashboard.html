<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    width:400px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:10px;
    color:#333;
}

p{
    color:#666;
    margin-bottom:30px;
}

button{
    background:#4facfe;
    border:none;
    padding:12px 25px;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#2d8cf0;
}

.topbar{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    font-size:18px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="topbar">
My Website
</div>

<div class="container">

<h1>Welcome 🎉</h1>

<p>You have successfully logged in.</p>

<button onclick="logout()">Logout</button>

</div>

<script>

function logout(){
    window.location = "login.html"
}

</script>

</body>
</html>
